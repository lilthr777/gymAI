version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: gymai-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_DATABASE: gymai
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./backend/gym-server/src/main/resources/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  gym-server:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gymai-server
    ports:
      - "8080:8080"
    environment:
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD:-root}
      JWT_SECRET: ${JWT_SECRET:-gymAI-JWT-Secret-Key-Must-Be-256-Bits-Long!!}
    depends_on:
      mysql:
        condition: service_healthy

  springai-model:
    build:
      context: ./backend
      dockerfile: Dockerfile-ai
    container_name: gymai-ai
    ports:
      - "8088:8088"
    environment:
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}

volumes:
  mysql-data:
